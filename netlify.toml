# ── Build ────────────────────────────────────────────────────────────────────
[build]
  command = "npm run build"
  publish = "build/client"

[build.environment]
  NODE_VERSION = "20"

# ── SPA fallback ─────────────────────────────────────────────────────────────
# Redirige todas las rutas al index.html para que React Router
# maneje el enrutamiento client-side (/quiz, /results, etc.)
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# ── Headers de seguridad ─────────────────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"

# Assets con caché larga (Vite les pone hash en el nombre)
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
